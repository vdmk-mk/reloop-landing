<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reloop Performance Set – Angebot</title>
  
  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --accent: #FFD700; 
      --bg: #000000;
      --text: #ffffff;
      --text-dim: #E0E0E0;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 0;
      height: 100vh;

      /* Zentriert das Popup sauber im Viewport */
      display: flex;
      justify-content: center;
      align-items: center;

      background-color: #121212;
      font-family: 'Poppins', sans-serif;
    }

    .popup {
      display: flex;
      width: 1000px;
      height: 650px;
      background: var(--bg);
      border-radius: 20px;
      overflow: hidden;

      /* Weicher Schatten für Tiefe */
      box-shadow: 0 40px 100px rgba(0,0,0,0.8);
    }

    .content-side {
      flex: 1.1;

      /* Innenabstand bewusst großzügig gewählt */
      padding: 60px 40px 50px 70px;

      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .badge {
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 2px; 
      font-weight: 700;
      font-size: 13px;

      /* Kleiner Abstand zum Titel */
      margin-bottom: 8px;

      white-space: nowrap;
    }

    h1 {
      font-size: 54px;
      font-weight: 800;

      /* Abstand nach unten für bessere Lesbarkeit */
      margin: 0 0 20px 0;

      line-height: 1.05;
      color: var(--text);
    }

    .features {
      list-style: none;
      padding: 0;

      /* Abstand zur Preisbox */
      margin: 0 0 25px 0;
    }

    .features li {
      margin-bottom: 10px;
      font-size: 17px;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      font-weight: 400;
    }

    .features li::before {
      content: '';
      display: inline-block;
      width: 10px;
      height: 10px;
      margin-right: 15px;
      border-radius: 50%;
      border: 3px solid var(--accent);
      background: transparent;

      /* Kleiner visueller Effekt im Punkt */
      box-shadow: inset 0 0 0 2px var(--bg);

      flex-shrink: 0;
    }

    .price-tag {
      /* Etwas Luft vor dem CTA */
      margin-bottom: 30px;
    }

    .old-price {
      text-decoration: line-through;
      color: #CC0000;
      font-size: 22px;
      font-weight: 600;
      display: block;

      margin-bottom: 2px;
    }

    .new-price {
      /* Bewusst etwas reduziert für bessere Balance mit CTA */
      font-size: 64px;
      font-weight: 800;
      color: var(--accent);
      display: block;
      line-height: 1;
    }

    .btn-cta {
      background: #FFFFFF;
      color: #000;
      border: none;

      /* Größere CTA für stärkeren Fokus */
      width: 300px;
      height: 70px;

      display: flex;
      align-items: center;
      justify-content: center;

      font-size: 20px;
      font-weight: 700;
      text-transform: uppercase;

      border-radius: 14px;
      cursor: pointer;
      transition: 0.3s ease;
      text-decoration: none;

      /* Gewünschter Abstand zum Footer */
      margin-bottom: 16px;
    }

    .btn-cta:hover {
      background: var(--accent);

      /* Leichter Hover-Effekt */
      transform: translateY(-2px);
    }

    .footer-credit {
      /* Drückt den Footer nach unten */
      margin-top: auto;

      font-size: 11px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .image-side {
      flex: 0.9;
      position: relative;
    }

    .image-side img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .image-overlay {
      position: absolute;
      top: 0; 
      left: 0; 
      width: 100%; 
      height: 100%;

      /* Verlauf für besseren Übergang zum Content */
      background: linear-gradient(to right, var(--bg) 0%, transparent 15%);
    }
  </style>
</head>
<body>

  <div class="popup">
    <div class="content-side">
      
      <!-- Hinweis auf zeitlich begrenztes Angebot -->
      <div class="badge">Zeitlich begrenztes Angebot</div>

      <h1>Reloop <br> Performance Set</h1>
      
      <ul class="features">
        <!-- Produkt-Highlights -->
        <li>4-Kanal DJ-Controller in Premium-Qualität</li>
        <li>Klang auf Studio-Niveau</li>
        <li>Nahtlose Integration mit Algoriddim</li>
        <li>Performance Pads mit direktem Feedback</li>
      </ul>

      <div class="price-tag">
        <!-- Alter vs. neuer Preis -->
        <span class="old-price">1.299 €</span>
        <span class="new-price">999 €</span>
      </div>

      <!-- Call-to-Action -->
      <a href="#" class="btn-cta">Jetzt ansehen</a>
      
      <!-- Kleine Signatur -->
      <div class="footer-credit">
        Designkonzept von <strong>Vadym Sechka</strong>
      </div>
    </div>

    <div class="image-side">
      <div class="image-overlay"></div>

      <!-- Produktbild -->
      <img src="reloop-product.jpg" alt="Reloop DJ Controller">
    </div>
  </div>

</body>
</html>
